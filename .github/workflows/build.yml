name: Android Build

on:
  push:
    branches: [ "main", "*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: cd OsmAnd-Cellular-Surround && chmod +x gradlew

    - name: Build with Gradle
      run: cd OsmAnd-Cellular-Surround && ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: OsmAnd-Cellular-Surround/app/build/outputs/apk/debug/app-debug.apk
